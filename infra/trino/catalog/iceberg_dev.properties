# MESMO data lake, MESMAS tabelas — só que apontando para o branch `etl_branch`.
# É isto que torna "data-as-code" possível: escreva/valide em iceberg_dev
# (branch isolado) sem nunca tocar em `main`. Depois faça merge ou rollback.
#
# Zero-copy: o branch NÃO duplica dados — compartilha os mesmos arquivos de
# main via os ponteiros de metadados do Nessie (copy-on-write só no que muda).
connector.name=iceberg
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie:19120/api/v2
iceberg.nessie-catalog.ref=etl_branch
iceberg.nessie-catalog.default-warehouse-dir=s3://warehouse

fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
